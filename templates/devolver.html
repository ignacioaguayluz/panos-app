<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Devolver Paño</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex flex-col items-center justify-center min-h-screen">

  <h1 class="text-3xl font-bold mb-6">Devolver Paño</h1>

  <input
    id="carnet"
    type="text"
    inputmode="numeric"
    maxlength="4"
    placeholder="N° de carnet"
    class="w-48 text-center text-xl tracking-widest border-2 border-slate-300 rounded-xl px-4 py-3 bg-white shadow focus:outline-none focus:border-green-500 transition"
  />


<button onclick="enviar()" 
       class="bg-green-600 text-white px-8 py-4 rounded-xl shadow-lg hover:scale-105 transition">
Confirmar devolución </button>

  <script>
    function enviar() {
      const carnet = document.getElementById("carnet").value.trim();

      // Validación simple en frontend
      if (!/^\d{4}$/.test(carnet)) {
        alert("❌ El carnet debe tener exactamente 4 dígitos");
        return;
      }

      fetch("/accion", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ 
          tipo: "devolver",
          carnet: carnet
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          alert("❌ " + data.error);
        } else {
          alert("✅ Paño devuelto correctamente");
          document.getElementById("carnet").value = "";
        }
      })
      .catch(() => alert("❌ Error de conexión con el servidor"));
    }a
  </script>

</body>
</html>
